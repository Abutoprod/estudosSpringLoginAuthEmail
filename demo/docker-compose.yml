services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=estoque_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=tr4ptr1x
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - TZ=America/Sao_Paulo
      - SPRING_PROFILES_ACTIVE=dev

      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/estoque_db
      - SPRING_DATASOURCE_USERNAME=admin
      - API_SECURITY_TOKEN_SECRET=projeto-open-inventory-2026
      - SPRING_DATASOURCE_PASSWORD=tr4ptr1x
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      # 
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC
    volumes:
      - .:/app
    deploy:            # <-- Movido para dentro do serviço 'app'
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M